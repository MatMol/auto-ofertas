name = "auto-ofertas-scraper"
main = "src/worker.ts"
compatibility_date = "2025-01-01"

[triggers]
crons = [
  "0 */2 * * *",   # Every 2 hours: ingest
  "0 */6 * * *",   # Every 6 hours: scoring
  "0 3 * * *",     # Daily at 3 AM: cleanup
]

[[d1_databases]]
binding = "DB"
database_name = "auto-ofertas-db"
database_id = "YOUR_D1_DATABASE_ID"

[vars]
USD_RATE = "1180"
